<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alternate Endings</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#f6f9fc,#eef2f7);
    transition: 0.4s;
}

/* NAV */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* HERO */
.hero {
    text-align:center;
    padding:40px 20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card {
    background:white;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card:hover {
    transform:translateY(-8px);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content {
    padding:15px;
}

/* DARK */
.dark {
    background:#0f172a;
    color:white;
}

.dark .navbar, .dark .card {
    background:#1e293b;
}

/* BUTTON */
button {
    padding:8px 12px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* ANIMATION */
body {
    animation:fade 0.8s ease;
}
@keyframes fade {
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="navbar">
    <h2>✨ Alternate Endings</h2>
    <button onclick="toggleTheme()">🌙</button>
</div>

<div class="hero">
    <h2>Reimagine Stories</h2>
    <p>Click a story to explore alternate endings</p>
</div>

<div class="grid">

<div class="card" onclick="go('story1.html')">
<img src="https://picsum.photos/400/200?1">
<div class="card-content"><h3>Cinderella</h3></div>
</div>

<div class="card" onclick="go('story2.html')">
<img src="https://picsum.photos/400/200?2">
<div class="card-content"><h3>Red Riding Hood</h3></div>
</div>

<div class="card" onclick="go('story3.html')">
<img src="https://picsum.photos/400/200?3">
<div class="card-content"><h3>Snow White</h3></div>
</div>

<div class="card" onclick="go('story4.html')">
<img src="https://picsum.photos/400/200?4">
<div class="card-content"><h3>Rapunzel</h3></div>
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
function playSound(){
    let s=document.getElementById("sound");
    s.currentTime=0;
    s.play();
}

function go(page){
    playSound();
    setTimeout(()=>window.location=page,200);
}

function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
        document.body.classList.contains("dark")?"dark":"light");
    playSound();
}

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
}
</script>

</body>
</html>
